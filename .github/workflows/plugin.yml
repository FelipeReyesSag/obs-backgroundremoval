name: Plugin CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['*']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Microsoft's last ONNX Runtime release that ships onnxruntime-osx-universal2
# is v1.23.2. When bumping, keep the three build jobs below in sync.

jobs:
  build-windows:
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-windows.yml
    with:
      VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
      vcpkg-version: '2025.08.27'
      ort-version: v1.23.2

  build-macos:
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-macos.yml
    with:
      VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
      vcpkg-version: '2025.08.27'
      ort-version: v1.23.2
      # Codesigning + notarization require an Apple Developer Program account
      # and the corresponding MACOS_SIGNING_* / MACOS_NOTARIZATION_* secrets.
      # This fork ships unsigned .pkg files for now; flip to a tag-gated
      # condition (and add the secrets) once you're ready to publish signed
      # releases.
      codesign-enabled: false
    secrets: inherit

  build-ubuntu:
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-ubuntu.yml
    with:
      VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
      vcpkg-version: '2025.08.27'
      ort-version: v1.23.2

  accept-plugin:
    name: Accept Plugin CI
    needs: [build-windows, build-macos, build-ubuntu]
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept plugin
        run: |
          echo 'The workflow plugin has completed successfully.'

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: accept-plugin
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/plugin-release.yml
