# file: .github/workflows/plugin-build-windows.yml
# description: Build the Plate Blur plugin for Windows x64.

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: true
        type: string
      vcpkg-version:
        description: The version of vcpkg to clone.
        required: true
        type: string
      ort-version:
        description: 'ONNX Runtime release tag (e.g. v1.23.2). The release must ship onnxruntime-win-x64-*.zip.'
        required: true
        type: string

permissions: {}

jobs:
  build-windows-x64:
    environment: ${{ inputs.environment }}
    runs-on: windows-2022
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      CLEAN_PWSH_ENV: '${{ github.workspace }}\.github\scripts\clean-env-windows.ps1'
      FILTERED_PATH: 'C:\ProgramData\chocolatey\bin;C:\Program Files\CMake\bin;C:\Program Files\Git\cmd;C:\Windows\System32\WindowsPowerShell\v1.0;C:\Windows\System32;C:\Windows'
      ROOT_VCPKG_ROOT: '${{ github.workspace }}\vcpkg'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      - name: Print CMake version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          cmake --version

      - name: Print Ninja version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          ninja --version

      - name: Print vswhere information for Visual Studio 2022 on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          vswhere -version '[17.0,18.0)'

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ inputs.vcpkg-version }}
          persist-credentials: false
          path: ${{ env.ROOT_VCPKG_ROOT }}

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $bootstrapVcpkgPath = "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & $bootstrapVcpkgPath -disableMetrics

      - name: Install dependencies from vcpkg (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $vcpkgPath = "$env:VCPKG_ROOT\vcpkg.exe"
          & $vcpkgPath install --x-install-root=.\.deps_vendor\vcpkg_installed --triplet=x64-windows-static-md-obs

      - name: Download OBS dependencies (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake -P ./scripts/download_deps.cmake

      - name: Build libobs (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/build_libobs_windows.ps1

      - name: Download prebuilt ONNX Runtime (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          KEEP_ENV_VARS: 'ORT_VERSION'
          ORT_VERSION: ${{ inputs.ort-version }}
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $version = $env:ORT_VERSION.TrimStart('v')
          $asset = "onnxruntime-win-x64-$version.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/$env:ORT_VERSION/$asset"

          New-Item -ItemType Directory -Force -Path .deps_vendor | Out-Null
          Invoke-WebRequest -Uri $url -OutFile ".deps_vendor/$asset"
          Expand-Archive -Path ".deps_vendor/$asset" -DestinationPath .deps_vendor -Force

          if (Test-Path .deps_vendor/onnxruntime) { Remove-Item .deps_vendor/onnxruntime -Recurse -Force }
          Move-Item ".deps_vendor/onnxruntime-win-x64-$version" .deps_vendor/onnxruntime

          if (-not (Test-Path .deps_vendor/onnxruntime/include/onnxruntime_cxx_api.h)) {
            throw "ONNX Runtime header missing after extraction."
          }

      - name: Fetch plate detection model
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/fetch_model.ps1

      - name: Configure (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake --preset windows-ci-x64

      - name: Build (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake --build --preset windows-ci-x64

      - name: Package (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/package_plugin_windows.ps1 -Target x64

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-pluginbinary-windows-x64-${{ github.run_id }}
          path: |
            release/*-windows-x64.zip
            release/*-windows-x64-pdb.zip
          if-no-files-found: error
          retention-days: 7
